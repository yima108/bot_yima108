<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Chatbot IA - by Gemma</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 650px; margin: 40px auto; padding: 0 20px; background-color: #f0f4f8; }
    h2 { color: #1565C0; text-align: center; }
    #chat { background: white; border: 1px solid #ccc; border-radius: 12px; height: 350px; overflow-y: auto; padding: 16px; margin-bottom: 12px; }
    .usuario { color: #1565C0; margin: 8px 0; }
    .bot { color: #2E7D32; margin: 8px 0; }
    .controles { display: flex; gap: 8px; }
    input, #api-key { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    button { padding: 10px 18px; background: #1565C0; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
    button:hover { background: #0D47A1; }
    #key-zone { background: #fff8e1; border: 1px solid #f9a825; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 14px; }
    #key-zone input { width: 100%; margin-top: 6px; box-sizing: border-box; }
  </style>
</head>
<body>
  <h2>🤖 Mi asistente IA - by Gemma</h2>

  <div id="key-zone">
    🔑 <b>Pega aquí tu API Key de Groq</b> (no se guarda ni se sube a ningún sitio):
    <input type="password" id="api-key" placeholder="gsk_..." />
  </div>

  <div id="chat"></div>
  <div class="controles">
    <input id="entrada" placeholder="Escribe tu pregunta aquí..." />
    <button onclick="enviar()">Enviar</button>
  </div>

  <script>
    const personalidad = "Eres un asistente de transporte de mercancías internacional. Respondes en español, de forma breve.";

    async function enviar() {
      const texto = document.getElementById('entrada').value.trim();
      const apiKey = document.getElementById('api-key').value.trim();
      if (!texto) return;
      if (!apiKey) { alert('Por favor, pega tu API Key arriba antes de enviar.'); return; }
      mostrarMensaje('Tú', texto, 'usuario');
      document.getElementById('entrada').value = '';
      mostrarMensaje('Bot', '...', 'bot');
      const respuesta = await llamarIA(texto, apiKey);
      const chat = document.getElementById('chat');
      chat.lastChild.innerHTML = '<b>Bot:</b> ' + respuesta;
    }

    function mostrarMensaje(quien, texto, clase) {
      const chat = document.getElementById('chat');
      chat.innerHTML += '<p class="' + clase + '"><b>' + quien + ':</b> ' + texto + '</p>';
      chat.scrollTop = chat.scrollHeight;
    }

    async function llamarIA(mensaje, apiKey) {
      try {
        const respuesta = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
          body: JSON.stringify({
            model: "llama-3.1-8b-instant",
            messages: [
              { role: "system", content: personalidad },
              { role: "user", content: mensaje }
            ],
            max_tokens: 200
          })
        });
        const datos = await respuesta.json();
        if (datos.error) return "Error: " + datos.error.message;
        return datos.choices[0].message.content;
      } catch (error) {
        return "Error de conexión. Revisa la API Key e inténtalo de nuevo.";
      }
    }

    document.getElementById('entrada').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') enviar();
    });
  </script>
</body>
</html>
